<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIRE Monte Carlo Lab</title>
<style>
:root{--bg:#f6f4ef;--panel:#fff;--ink:#202124;--muted:#667085;--line:#d7d2c8;--accent:#0f766e;--danger:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}.app{min-height:100vh;display:grid;grid-template-columns:minmax(320px,390px)1fr}aside{background:#fbfaf7;border-right:1px solid var(--line);padding:22px;overflow:auto}main{padding:24px;min-width:0}h1{font-size:24px;margin:0 0 4px}h2{font-size:16px;margin:0 0 12px}.sub{color:var(--muted);font-size:13px;margin:0 0 18px}.group{border-top:1px solid var(--line);padding-top:15px;margin-top:15px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:grid;gap:5px;color:var(--muted);font-size:12px}input,select{height:38px;border:1px solid #c9c3b8;border-radius:6px;background:#fff;color:var(--ink);padding:7px 9px}button{height:42px;border-radius:6px;border:0;cursor:pointer;font-weight:700}.primary{background:var(--accent);color:white}.secondary{background:white;border:1px solid #c9c3b8}.actions{display:grid;grid-template-columns:1fr auto;gap:10px;position:sticky;bottom:0;padding-top:14px;background:#fbfaf7}.top{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}.status{text-align:right;color:var(--muted);font-size:13px}.summary{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px;margin-bottom:18px}.card,.box{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 40px rgba(39,35,27,.12)}.card{padding:13px;min-height:92px}.card .v{font-size:20px;font-weight:800}.box{padding:16px;margin-bottom:18px;position:relative}canvas{display:block;width:100%;height:380px;background:#fffefa;border:1px solid #ece7de;border-radius:6px}.chartHead{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:12px}.legend{display:flex;gap:14px;color:var(--muted);font-size:12px;margin-top:10px}.sw{display:inline-block;width:24px;height:3px;border-radius:99px;background:#9ca3af;vertical-align:middle;margin-right:6px}.sw.mid{background:var(--accent)}table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}th,td{border-bottom:1px solid #e6e0d6;padding:11px 9px;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}th{color:var(--muted);font-size:12px}.err{color:var(--danger);font-weight:700}.tip{position:absolute;z-index:5;min-width:172px;border:1px solid #c9c3b8;border-radius:8px;background:rgba(255,255,255,.96);box-shadow:0 12px 28px rgba(39,35,27,.16);padding:10px 11px;font-size:12px;line-height:1.5;pointer-events:none;transform:translate(-50%,-108%);opacity:0}.tip.on{opacity:1}.tip strong{display:block;font-size:13px;margin-bottom:4px}.tr{display:flex;justify-content:space-between;gap:16px;font-variant-numeric:tabular-nums}@media(max-width:980px){.app{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}.summary{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){main,aside{padding:14px}h1{font-size:21px}h2{font-size:15px}.grid{grid-template-columns:1fr;gap:10px}input,select,button{height:44px}label{font-size:13px}.actions{grid-template-columns:1fr 1fr;margin-inline:-14px;padding:12px 14px 0}.top,.chartHead{display:block}.status{text-align:left}.summary{grid-template-columns:repeat(5,minmax(154px,1fr));overflow-x:auto;padding-bottom:4px;scroll-snap-type:x proximity}.card{min-height:84px;scroll-snap-align:start}.box{padding:12px;overflow-x:auto}canvas{height:300px}th,td{padding:10px 8px}}
</style>
</head>
<body>
<div class="app"><aside><h1>FIRE Monte Carlo Lab</h1><p class="sub">金額は万円単位。2026年5月をmonth 0、退職月は「月末退職、翌月FIRE」です。</p><form id="f">
<section class="group"><h2>初期資産</h2><div class="grid"><label>総資産<input name="initialTotal" type="number" step="1" value="14448"></label><label>リスク資産<input name="initialRisk" type="number" step="1" value="12964"></label></div></section>
<section class="group"><h2>リターン</h2><div class="grid"><label>幾何平均 年率%<input name="annualReturn" type="number" step="0.1" value="7"></label><label>標準偏差 年率%<input name="annualVol" type="number" min="0" step="0.1" value="18"></label></div></section>
<section class="group"><h2>ガードレール</h2><div class="grid"><label>増額しきい値%<input name="guardLow" type="number" step="0.1" value="3"></label><label>減額しきい値%<input name="guardHigh" type="number" step="0.1" value="6"></label><label>年額変更幅<input name="guardStep" type="number" step="1" value="30"></label><label>取り崩し上限<input name="withdrawalMax" type="number" step="1" value="780"></label><label>生活費下限<input name="withdrawalMin" type="number" step="1" value="540"></label><label>初年度取り崩し<input name="initialWithdrawal" type="number" step="1" value="624"></label></div></section>
<section class="group"><h2>収入・現金管理</h2><div class="grid"><label>就労中積立 月額<input name="monthlySaving" type="number" step="1" value="145"></label><label>退職金<input name="severance" type="number" step="1" value="2200"></label><label>年金 月額<input name="pensionMonthly" type="number" step="1" value="25"></label><label>年金開始 年後<input name="pensionStartYears" type="number" step="1" value="22"></label><label>医師バイト上限 年額<input name="maxSideJob" type="number" step="1" value="120"></label><label>現金バッファ 下限<input name="cashBufferLow" type="number" step="1" value="1000"></label><label>現金バッファ 上限<input name="cashBufferHigh" type="number" step="1" value="1200"></label><label>緊急補充ライン<input name="cashBufferEmergency" type="number" step="1" value="800"></label></div></section>
<section class="group"><h2>実験設定</h2><div class="grid"><label>乱数シード<input name="seed" type="number" step="1" value="20260424"></label><label>試行回数<input name="trials" type="number" min="100" max="30000" step="100" value="1000"></label></div></section>
<div class="actions"><button id="run" class="primary">再計算</button><button id="reset" class="secondary" type="button">初期化</button></div></form></aside>
<main><div class="top"><div><h1>5つの退職タイミング比較</h1><p class="sub">同じ乱数系列で各シナリオを比較します。</p></div><div id="status" class="status">未計算</div></div><section id="summary" class="summary"></section><section class="box"><div class="chartHead"><h2>資産推移</h2><label>表示シナリオ<select id="scenario"></select></label></div><canvas id="chart"></canvas><div id="tip" class="tip" aria-hidden="true"></div><div class="legend"><span><i class="sw"></i>5%分位</span><span><i class="sw mid"></i>中央値</span><span><i class="sw"></i>95%分位</span></div></section><section class="box"><h2>結果表</h2><table><thead><tr><th>退職タイミング</th><th>退職時資産中央値</th><th>40年後5%</th><th>40年後中央値</th><th>40年後95%</th><th>成功率</th></tr></thead><tbody id="tbody"></tbody></table><p class="sub">破綻した試行は、その時点以降 risk=0, cash=0 のまま固定されます。</p></section></main></div>
<script>
const MONTHS=480,YEARS=40,SCENARIOS=[['即FIRE',0],['2026年6月',2],['2026年12月',8],['2027年6月',14],['2027年12月',20]];const f=document.getElementById('f'),run=document.getElementById('run'),statusEl=document.getElementById('status'),summary=document.getElementById('summary'),tbody=document.getElementById('tbody'),sel=document.getElementById('scenario'),canvas=document.getElementById('chart'),tip=document.getElementById('tip'),ctx=canvas.getContext('2d');let results=[],hover=null,state=null;SCENARIOS.forEach(([n])=>sel.add(new Option(n,n)));
function n(k){const v=Number(new FormData(f).get(k));return Number.isFinite(v)?v:0}function params(){const total=n('initialTotal'),risk=n('initialRisk');return{initialTotal:total,initialRisk:risk,initialCash:total-risk,annualReturn:n('annualReturn')/100,annualVol:n('annualVol')/100,guardLow:n('guardLow')/100,guardHigh:n('guardHigh')/100,guardStep:n('guardStep'),withdrawalMax:n('withdrawalMax'),withdrawalMin:n('withdrawalMin'),initialWithdrawal:n('initialWithdrawal'),monthlySaving:n('monthlySaving'),severance:n('severance'),pensionMonthly:n('pensionMonthly'),pensionStartMonth:Math.round(n('pensionStartYears')*12),maxSideJob:n('maxSideJob'),cashBufferLow:n('cashBufferLow'),cashBufferHigh:n('cashBufferHigh'),cashBufferEmergency:n('cashBufferEmergency'),seed:Math.trunc(n('seed')),trials:Math.max(100,Math.min(30000,Math.trunc(n('trials'))))}}
function mulberry32(a){let t=a>>>0;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^t>>>15,1|t);r^=r+Math.imul(r^r>>>7,61|r);return((r^r>>>14)>>>0)/4294967296}}function normal(seed){const rnd=mulberry32(seed);let spare=null;return()=>{if(spare!==null){const v=spare;spare=null;return v}let u=0,v=0;while(!u)u=rnd();while(!v)v=rnd();const m=Math.sqrt(-2*Math.log(u)),a=2*Math.PI*v;spare=m*Math.sin(a);return m*Math.cos(a)}}
function returns(p){const out=Array.from({length:MONTHS},()=>new Float64Array(p.trials)),g=normal(p.seed),mu=Math.log1p(p.annualReturn)/12,sd=p.annualVol/Math.sqrt(12);for(let m=0;m<MONTHS;m++)for(let i=0;i<p.trials;i++)out[m][i]=Math.exp(mu+sd*g());return out}function dec(m){return((5+m-1)%12)+1===12}function pct(arr,q){const s=Array.from(arr).sort((a,b)=>a-b),x=(s.length-1)*q,l=Math.floor(x),u=Math.ceil(x);return l===u?s[l]:s[l]+(s[u]-s[l])*(x-l)}function annual(series){const p5=[],p50=[],p95=[];for(const a of series){p5.push(pct(a,.05));p50.push(pct(a,.5));p95.push(pct(a,.95))}return{p5,p50,p95}}
function simulate(sc,rets,p){const T=p.trials,risk=new Float64Array(T),cash=new Float64Array(T),wd=new Float64Array(T),side=new Float64Array(T),top=new Float64Array(T),ret=new Float64Array(T),alive=new Uint8Array(T),prev=new Float64Array(T),yrs=Array.from({length:YEARS+1},()=>new Float64Array(T));let retired=sc[1]===0;for(let i=0;i<T;i++){risk[i]=p.initialRisk;cash[i]=p.initialCash;wd[i]=p.initialWithdrawal;alive[i]=1;ret[i]=NaN;if(retired){cash[i]+=p.severance;ret[i]=risk[i]+cash[i]}prev[i]=risk[i];yrs[0][i]=risk[i]+cash[i]}for(let m=0;m<MONTHS;m++){if(m===sc[1]&&!retired){for(let i=0;i<T;i++)if(alive[i]){cash[i]+=p.severance;ret[i]=risk[i]+cash[i]}retired=true}const rm=rets[m];for(let i=0;i<T;i++){if(!alive[i])continue;risk[i]*=rm[i];if(!retired)risk[i]+=p.monthlySaving;else{const w=wd[i]/12,d=Math.min(risk[i],w);risk[i]-=d;cash[i]-=w-d;cash[i]+=side[i];cash[i]-=top[i]}if(m>=p.pensionStartMonth)cash[i]+=p.pensionMonthly;if(risk[i]+cash[i]<=0){risk[i]=0;cash[i]=0;alive[i]=0}}if(dec(m)){for(let i=0;i<T;i++){if(!alive[i])continue;const total=risk[i]+cash[i];if(retired){const rate=total>0?wd[i]/total:Infinity;let nw=wd[i];if(rate<p.guardLow)nw+=p.guardStep;if(rate>p.guardHigh)nw-=p.guardStep;nw=Math.min(Math.max(nw,0),p.withdrawalMax);const gap=Math.max(p.withdrawalMin-nw,0),sj=Math.min(gap,p.maxSideJob),ct=Math.max(gap-sj,0);wd[i]=nw;side[i]=sj/12;top[i]=ct/12}}const pos=new Uint8Array(T);for(let i=0;i<T;i++)pos[i]=risk[i]>prev[i]?1:0;for(let i=0;i<T;i++){if(!alive[i])continue;const ex=Math.max(cash[i]-p.cashBufferHigh,0);if(ex>0){risk[i]+=ex;cash[i]-=ex}if(cash[i]<p.cashBufferLow&&pos[i]){const r=Math.min(risk[i],Math.max(p.cashBufferLow-cash[i],0));risk[i]-=r;cash[i]+=r}if(cash[i]<p.cashBufferEmergency&&!pos[i]){const e=Math.min(risk[i],Math.max(p.cashBufferEmergency-cash[i],0));risk[i]-=e;cash[i]+=e}if(risk[i]+cash[i]<=0){risk[i]=0;cash[i]=0;alive[i]=0}}for(let i=0;i<T;i++)prev[i]=risk[i]}if((m+1)%12===0){const y=(m+1)/12;for(let i=0;i<T;i++)yrs[y][i]=risk[i]+cash[i]}}const end=new Float64Array(T);let ok=0;for(let i=0;i<T;i++){end[i]=risk[i]+cash[i];ok+=alive[i]}return{name:sc[0],retirementMedian:pct(ret,.5),endP5:pct(end,.05),endMedian:pct(end,.5),endP95:pct(end,.95),successRate:ok/T,series:annual(yrs)}}
function yen(v){return Math.round(v).toLocaleString('ja-JP')}function per(v){return(v*100).toFixed(2)+'%'}async function calc(){const p=params(),errs=[];if(p.initialCash<0)errs.push('総資産はリスク資産以上にしてください。');if(p.guardHigh<p.guardLow)errs.push('減額しきい値は増額しきい値以上にしてください。');if(p.cashBufferHigh<p.cashBufferLow)errs.push('現金バッファ上限は下限以上にしてください。');if(p.annualReturn<=-.999)errs.push('想定利回りは-99.9%より大きくしてください。');if(errs.length){statusEl.innerHTML='<span class="err">'+errs.join(' ')+'</span>';return}run.disabled=true;statusEl.textContent='計算中...';await new Promise(r=>setTimeout(r,20));const t=performance.now(),rs=returns(p);results=SCENARIOS.map(s=>simulate(s,rs,p));render();statusEl.textContent=p.trials.toLocaleString('ja-JP')+'試行 / '+((performance.now()-t)/1000).toFixed(2)+'秒';run.disabled=false}
function render(){summary.innerHTML=results.map(r=>`<article class="card"><div class="sub">${r.name}</div><div class="v">${per(r.successRate)}</div><div class="sub">40年後中央値 ${yen(r.endMedian)}</div></article>`).join('');tbody.innerHTML=results.map(r=>`<tr><td>${r.name}</td><td>${yen(r.retirementMedian)}</td><td>${yen(r.endP5)}</td><td>${yen(r.endMedian)}</td><td>${yen(r.endP95)}</td><td>${per(r.successRate)}</td></tr>`).join('');chart()}
function current(){return results.find(x=>x.name===sel.value)||results[0]}function chart(){const r=current();if(!r)return;const dpr=devicePixelRatio||1,rect=canvas.getBoundingClientRect(),W=Math.max(280,rect.width),H=Math.max(260,rect.height);canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);const small=W<520,p=small?{l:52,r:12,t:22,b:38}:{l:72,r:18,t:22,b:42},pw=W-p.l-p.r,ph=H-p.t-p.b,max=Math.max(...r.series.p95)*1.05||1,x=y=>p.l+y/YEARS*pw,yy=v=>p.t+ph-v/max*ph;state={p,pw,x};ctx.clearRect(0,0,W,H);ctx.fillStyle='#fffefa';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#e6e0d6';ctx.fillStyle='#667085';ctx.font=(small?10:12)+'px system-ui';ctx.textAlign='right';ctx.textBaseline='middle';for(let i=0;i<=4;i++){const v=max/4*i,Y=yy(v);ctx.beginPath();ctx.moveTo(p.l,Y);ctx.lineTo(W-p.r,Y);ctx.stroke();ctx.fillText(yen(v),p.l-10,Y)}ctx.textAlign='center';ctx.textBaseline='top';for(let y=0;y<=YEARS;y+=small?20:10)ctx.fillText(y+'年',x(y),H-p.b+14);line(r.series.p5,'#9ca3af',1.5,x,yy);line(r.series.p95,'#9ca3af',1.5,x,yy);line(r.series.p50,'#0f766e',3,x,yy);if(hover!==null){const hx=x(hover);ctx.strokeStyle='rgba(32,33,36,.28)';ctx.beginPath();ctx.moveTo(hx,p.t);ctx.lineTo(hx,p.t+ph);ctx.stroke();pt(hx,yy(r.series.p5[hover]),'#9ca3af');pt(hx,yy(r.series.p50[hover]),'#0f766e');pt(hx,yy(r.series.p95[hover]),'#9ca3af')}ctx.fillStyle='#202124';ctx.font='600 '+(small?12:13)+'px system-ui';ctx.textAlign='left';ctx.fillText(r.name+' / 年次総資産',p.l,8)}function pt(x,y,c){ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#fffefa';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke()}function line(a,c,w,x,y){ctx.beginPath();a.forEach((v,i)=>i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v)));ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke()}
canvas.addEventListener('pointermove',e=>{const r=current();if(!r||!state)return;const cr=canvas.getBoundingClientRect(),br=canvas.closest('.box').getBoundingClientRect(),raw=((e.clientX-cr.left-state.p.l)/state.pw)*YEARS;hover=Math.max(0,Math.min(YEARS,Math.round(raw)));tip.style.left=Math.max(92,Math.min(e.clientX-br.left,br.width-92))+'px';tip.style.top=Math.max(82,e.clientY-br.top)+'px';tip.innerHTML=`<strong>${r.name} / ${hover}年目</strong><div class="tr"><span>5%</span><span>${yen(r.series.p5[hover])}</span></div><div class="tr"><span>中央値</span><span>${yen(r.series.p50[hover])}</span></div><div class="tr"><span>95%</span><span>${yen(r.series.p95[hover])}</span></div>`;tip.classList.add('on');chart()});canvas.addEventListener('pointerleave',()=>{hover=null;tip.classList.remove('on');chart()});f.addEventListener('submit',e=>{e.preventDefault();calc()});document.getElementById('reset').onclick=()=>{f.reset();calc()};sel.onchange=chart;addEventListener('resize',()=>results.length&&chart());calc();
</script>
</body>
</html>
